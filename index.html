<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClearCast Foercast App</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="wholebody">

    <nav class="navbar">

      <a href="./index.html"><i class="fa-regular fa-house"></i></a>
      <a href="./page/weather-details.html"><i class="fa-regular fa-circle-question"></i></a>
      <a href="./page/userprofile.html"><i class="fa-regular fa-user"></i></a>

    </nav>
    <div class="searchbar">
      <input id="cityInput" type="text" placeholder="Search for location">
      <button id="searchCity"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>

    <!-- Open state -->

    <div id="emptyState" class="empty-state">
      <img src="./image/50n.png" alt="">
      <h3>Search for a city</h3>
      <p>Enter a city name above to see the weather</p>
    </div>

    <!-- LOADING STATE -->

    <div id="loadingState" class="loading-state" style="display:none;">
      <div class="spinner"></div>
      <p>Fetching weather data...</p>
    </div>

    <div class="forecast-location" id="forecastLocation">
      <div>
        <h2 id="location">Loading......</h2>
        <p id="country">Null</p>
      </div>
      <button><i class="fa-solid fa-location-crosshairs"></i></button>

    </div>

    <div id="forecast-info" class="forecast-info">
      <img id="weatherIcon" src="./image/50n.png" alt="">

      <div>
        <h1 id="temp">0°C</h1>
        <div class="info-div">
          <p id="description">Clear~</p>
          <p id="feelsLike">0°</p>
        </div>
      </div>

      <div class="forecast-card">

        <div class="card">
          <p>Speed</p>
          <h5 id="speed">0m/s</h5>
        </div>
        <div class="card">
          <p>Humidity</p>
          <h5 id="humidity">0%</h5>
        </div>
        <div class="card">
          <p>Wind</p>
          <h5 id="wind">N/A</h5>
        </div>

      </div>


    </div>

    <div id="todayForecast" class="today-forecast">

    </div>

    <section id="forEachDay">

    </section>

  </div>
  <script src="./js/script.js"></script>
</body>

</html>
